# fly.toml app configuration for Fly.io deployment
app = "spacemountain-live"
primary_region = "lax"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "spacemountain_data"
  destination = "/data"
  initial_size = "1GB"
